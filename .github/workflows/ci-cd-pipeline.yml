name: Model Training and Evaluation Pipeline
on:
  push:
    branches:
      - main

jobs:
  trigger_kaggle_training:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.7"

    - name: Install Kaggle CLI
      run: pip install kaggle

    - name: Setup Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    - name: Update Kaggle script dataset
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        mkdir kaggle_upload
        cp model_training.py kaggle_upload/
        cp validate_model.py kaggle_upload/
        cp requirements.txt kaggle_upload/
        echo "{\"title\": \"trashnet scripts\", \"id\": \"$KAGGLE_USERNAME/trashnet-training-script\", \"licenses\": [{\"name\": \"CC0-1.0\"}]}" > kaggle_upload/dataset-metadata.json
        kaggle datasets version -p kaggle_upload -m "Update scripts"

    - name: Stop running notebook
      run: kaggle kernels cancel ${{ secrets.KAGGLE_USERNAME }}/trashnet-training || true

    - name: Wait
      run: sleep 30

    - name: Trigger Kaggle notebook
      env:
        WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
      run: |
        sed -i "s|WANDB_KEY_PLACEHOLDER|$WANDB_API_KEY|g" kaggle_notebook/kernel.py
        sed -i "s|HF_KEY_PLACEHOLDER|$HF_API_KEY|g" kaggle_notebook/kernel.py
        kaggle kernels push -p kaggle_notebook/

    - name: Wait for Kaggle to finish
      run: |
        SLUG="${{ secrets.KAGGLE_USERNAME }}/trashnet-training"
        for i in $(seq 1 120); do
          STATUS=$(kaggle kernels status $SLUG)
          echo "[$i/120] $STATUS"
          echo "$STATUS" | grep -qi "complete" && exit 0
          echo "$STATUS" | grep -qi "error" && exit 1
          sleep 60
        done
        exit 1