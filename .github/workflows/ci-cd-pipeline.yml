name: Model Training and Evaluation Pipeline

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:

  train_model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4  
      with:
        python-version: '3.11.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Log in to WandB
      run: |
        echo "WANDB_API_KEY=${{ secrets.WANDB_API_KEY }}" >> $GITHUB_ENV
        wandb login ${{ secrets.WANDB_API_KEY }}

    - name: Run model training
      run: |
        python model_training.py

    - name: Commit local changes before pulling
      run: |
        git add .  # Stage any changes
        git commit -m "Saving local changes before pulling" || echo "No changes to commit"  # Commit if changes exist

    - name: Pull the latest changes from the remote repository
      run: |
        git pull origin main  # Pull the latest changes from the main branch

    - name: Set up Git LFS
      run: |
        curl -s https://packagecloud.io/install/repositories/github/git-lfs/script.deb.sh | sudo bash
        sudo apt-get install git-lfs
        git lfs install

    - name: Commit and Push Model Files using Git LFS
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git lfs track "*.safetensors"  # Track model files with LFS
        git add .gitattributes
        git add model/ processor/
        git commit -m "Add trained model and processor files"
        git push origin main

  publish_model:
    needs: train_model
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4  
      with:
        python-version: '3.11.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Log in to Hugging Face
      run: |
        echo "HF_API_KEY=${{ secrets.HF_API_KEY }}" >> $GITHUB_ENV
        huggingface-cli login --token ${{ secrets.HF_API_KEY }}

    - name: Publish model to Hugging Face
      run: |
        python publish_to_hf.py

  validate_model:
    needs: publish_model
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4  
      with:
        python-version: '3.11.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run model validation
      run: |
        python validate_model.py
