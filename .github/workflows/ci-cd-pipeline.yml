name: Model Training and Evaluation Pipeline

on:
  push:
    branches:
      - main

jobs:
  trigger_kaggle_training:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Debug repo structure
      run: |
        echo "Repository structure:"
        ls -R

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.7"

    - name: Install Kaggle CLI
      run: pip install kaggle

    - name: Setup Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    # =========================
    # Upload training scripts
    # =========================

    - name: Upload training scripts dataset
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        mkdir kaggle_upload

        cp model_training_resnet.py kaggle_upload/
        cp model_training_swin.py kaggle_upload/
        cp validate_model_resnet.py kaggle_upload/
        cp validate_model_swin.py kaggle_upload/
        cp requirements.txt kaggle_upload/

        echo "{\"title\": \"trashnet-training-script\", \"id\": \"$KAGGLE_USERNAME/trashnet-training-script\", \"licenses\": [{\"name\": \"CC0-1.0\"}]}" > kaggle_upload/dataset-metadata.json

        kaggle datasets create -p kaggle_upload --dir-mode zip || \
        kaggle datasets version -p kaggle_upload -m "Update scripts from GitHub Actions"

    # =========================
    # Upload dataset images
    # =========================

    - name: Upload image dataset
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        echo "{\"title\": \"trashnet-data\", \"id\": \"$KAGGLE_USERNAME/trashnet-data\", \"licenses\": [{\"name\": \"CC0-1.0\"}]}" > data/dataset-metadata.json

        kaggle datasets create -p data --dir-mode zip || \
        kaggle datasets version -p data -m "Update dataset from GitHub Actions"

    - name: Trigger Kaggle notebook run
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
        WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
      run: |
        sed -i "s|WANDB_KEY_PLACEHOLDER|$WANDB_API_KEY|g" kaggle_notebook/kernel.py
        sed -i "s|HF_KEY_PLACEHOLDER|$HF_API_KEY|g" kaggle_notebook/kernel.py
        kaggle kernels push -p kaggle_notebook/

    # =========================
    # Push kernel ke Kaggle
    # =========================

    - name: Push Kaggle kernel
      run: |
        kaggle kernels push -p kaggle_notebook

    # =========================
    # Tunggu training selesai
    # =========================

    - name: Wait for Kaggle notebook
      run: |
        NOTEBOOK_SLUG="${{ secrets.KAGGLE_USERNAME }}/trashnet-training"

        echo "Waiting for notebook..."

        for i in $(seq 1 120); do

          RAW_STATUS=$(kaggle kernels status $NOTEBOOK_SLUG)

          echo "Raw status: $RAW_STATUS"

          if echo "$RAW_STATUS" | grep -qi "complete"; then
            echo "Training finished!"
            exit 0
          elif echo "$RAW_STATUS" | grep -qi "error"; then
            echo "Training failed!"
            exit 1
          fi

          sleep 60
        done

        echo "Timeout waiting for Kaggle run"
        exit 1

    # =========================
    # Download output
    # =========================

    - name: Download Kaggle output
      run: |
        kaggle kernels output ${{ secrets.KAGGLE_USERNAME }}/trashnet-training -p kaggle_output
        ls kaggle_output

    # =========================
    # Copy results
    # =========================

    - name: Collect results
      run: |
        mkdir -p results

        cp kaggle_output/confusion_matrix_resnet.png results/ || true
        cp kaggle_output/confusion_matrix_swin.png results/ || true
        cp kaggle_output/sample_per_class_resnet.png results/ || true
        cp kaggle_output/sample_per_class_swin.png results/ || true
        cp kaggle_output/prediction_results_resnet.png results/ || true
        cp kaggle_output/prediction_results_swin.png results/ || true
        cp kaggle_output/accuracy_per_class_resnet.png results/ || true
        cp kaggle_output/accuracy_per_class_swin.png results/ || true

    # =========================
    # Generate README
    # =========================

    - name: Generate README
      run: python generate_readme.py

    # =========================
    # Commit results
    # =========================

    - name: Commit results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add results/
        git add README.md

        git diff --staged --quiet || git commit -m "Update results from Kaggle training [skip ci]"

        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # =========================
    # Upload artifact
    # =========================

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: training-results
        path: results/