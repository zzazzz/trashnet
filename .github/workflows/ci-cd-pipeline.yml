name: Model Training and Evaluation Pipeline
on:
  push:
    branches:
      - main

jobs:
  trigger_kaggle_training:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.7"

    - name: Install Kaggle CLI
      run: pip install kaggle

    - name: Setup Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    - name: Push latest code to Kaggle dataset
      run: |
        mkdir kaggle_upload
        cp model_training.py kaggle_upload/
        cp requirements.txt kaggle_upload/
        cd kaggle_upload
        cat > dataset-metadata.json << EOF
        {
          "title": "trashnet-training-script",
          "id": "${{ secrets.KAGGLE_USERNAME }}/trashnet-training-script",
          "licenses": [{"name": "CC0-1.0"}]
        }
        EOF
        kaggle datasets create -p . --dir-mode zip || kaggle datasets version -p . -m "Update from GitHub Actions"

    - name: Trigger Kaggle notebook run
      run: |
        kaggle kernels push -p kaggle_notebook/

    - name: Wait for Kaggle notebook to complete
      run: |
        NOTEBOOK_SLUG="${{ secrets.KAGGLE_USERNAME }}/trashnet-training"
        echo "Waiting for notebook to complete..."
        for i in $(seq 1 60); do
          RAW_STATUS=$(kaggle kernels status $NOTEBOOK_SLUG)
          echo "Raw status: $RAW_STATUS"
          
          if echo "$RAW_STATUS" | grep -qi "complete"; then
            echo "Notebook completed successfully!"
            exit 0
          elif echo "$RAW_STATUS" | grep -qi "error"; then
            echo "Notebook failed!"
            exit 1
          elif echo "$RAW_STATUS" | grep -qi "running"; then
            echo "Still running... (attempt $i/60)"
          elif echo "$RAW_STATUS" | grep -qi "queued"; then
            echo "Still queued... (attempt $i/60)"
          else
            echo "Unknown status, continuing... (attempt $i/60)"
          fi
          
          sleep 60
        done
        echo "Timeout waiting for notebook"
        exit 1

  validate_model:
    needs: trigger_kaggle_training
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_API_KEY }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.7"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Login to Hugging Face
      run: python -c "from huggingface_hub import login; login(token='${{ secrets.HF_API_KEY }}')"

    - name: Run model validation
      run: python validate_model.py