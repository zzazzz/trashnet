name: Model Training and Evaluation Pipeline

on:
  push:
    branches:
      - main

jobs:
  trigger_kaggle_training:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.7"

    - name: Install Kaggle CLI
      run: pip install --upgrade kaggle

    - name: Setup Kaggle credentials
      run: |
        mkdir -p ~/.kaggle
        echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json

    # =================================
    # Upload training scripts dataset
    # =================================

    - name: Upload training scripts dataset
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        rm -rf kaggle_upload
        mkdir kaggle_upload

        cp model_training_resnet.py kaggle_upload/
        cp model_training_swin.py kaggle_upload/
        cp validate_model_resnet.py kaggle_upload/
        cp validate_model_swin.py kaggle_upload/
        cp requirements.txt kaggle_upload/

        cat > kaggle_upload/dataset-metadata.json << EOF
        {
          "title": "trashnet-training-script",
          "id": "$KAGGLE_USERNAME/trashnet-training-script",
          "licenses": [{"name": "CC0-1.0"}]
        }
        EOF

        # ✅ Cek pakai status — lebih reliable dari grep list
        # Exit code 0 = dataset ada, non-0 = belum ada
        if kaggle datasets status $KAGGLE_USERNAME/trashnet-training-script > /dev/null 2>&1; then
          echo "Dataset already exists → creating new version..."
          kaggle datasets version -p kaggle_upload -m "Update scripts - ${{ github.sha }}"
        else
          echo "Dataset not found → creating for the first time..."
          kaggle datasets create -p kaggle_upload --dir-mode zip
        fi

    # =================================
    # Wait scripts dataset ready
    # =================================

    - name: Wait until scripts dataset is ready
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        DATASET="$KAGGLE_USERNAME/trashnet-training-script"
        echo "Waiting for dataset $DATASET to be ready..."

        for i in $(seq 1 30); do
          STATUS=$(kaggle datasets status $DATASET 2>/dev/null || echo "unknown")
          echo "Attempt $i: $STATUS"

          if echo "$STATUS" | grep -qi "ready"; then
            echo "Dataset ready!"
            break
          fi

          sleep 10
        done

    # =================================
    # Upload image dataset
    # =================================

    - name: Upload image dataset
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        # Zip dari dalam data/ — symlink ./data mengarah ke root dataset
        # Jadi struktur zip harus: train/, val/, test/ langsung di root
        mkdir -p kaggle_data_upload
        cd data && zip -r ../kaggle_data_upload/trashnet-data.zip train/ val/ test/ && cd ..

        cat > kaggle_data_upload/dataset-metadata.json << EOF
        {
          "title": "trashnet-data",
          "id": "$KAGGLE_USERNAME/trashnet-data",
          "licenses": [{"name": "CC0-1.0"}]
        }
        EOF

        # Cek pakai status - create pertama kali, version kalau sudah ada
        if kaggle datasets status $KAGGLE_USERNAME/trashnet-data > /dev/null 2>&1; then
          echo "Dataset already exists, creating new version..."
          kaggle datasets version -p kaggle_data_upload -m "Update dataset - ${{ github.sha }}"
        else
          echo "Dataset not found, creating for the first time..."
          kaggle datasets create -p kaggle_data_upload
        fi

        rm -rf kaggle_data_upload

    # =================================
    # Wait image dataset ready
    # =================================

    - name: Wait until image dataset is ready
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        DATASET="$KAGGLE_USERNAME/trashnet-data"
        echo "Waiting for dataset $DATASET to be ready..."

        for i in $(seq 1 30); do
          STATUS=$(kaggle datasets status $DATASET 2>/dev/null || echo "unknown")
          echo "Attempt $i: $STATUS"

          if echo "$STATUS" | grep -qi "ready"; then
            echo "Dataset ready!"
            break
          fi

          sleep 10
        done

        # Extra buffer setelah ready agar Kaggle propagate ke notebook mount
        echo "Extra 60s propagation buffer..."
        sleep 60

    # =================================
    # Inject API keys and trigger notebook
    # =================================

    - name: Trigger Kaggle notebook run
      env:
        WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        HF_API_KEY: ${{ secrets.HF_API_KEY }}
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        # Inject API keys ke deploy copy, bukan file asli
        cp kaggle_notebook/kernel.py kaggle_notebook/kernel_deploy.py
        sed -i "s|WANDB_KEY_PLACEHOLDER|${WANDB_API_KEY}|g" kaggle_notebook/kernel_deploy.py
        sed -i "s|HF_KEY_PLACEHOLDER|${HF_API_KEY}|g" kaggle_notebook/kernel_deploy.py
        mv kaggle_notebook/kernel_deploy.py kaggle_notebook/kernel.py

        # Update kernel-metadata.json dengan dataset sources terbaru
        python3 scripts/pin_dataset_versions.py

        kaggle kernels push -p kaggle_notebook

    # =================================
    # Wait training
    # =================================

    - name: Wait for Kaggle notebook
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        NOTEBOOK_SLUG="$KAGGLE_USERNAME/trashnet-training"
        echo "Waiting for notebook $NOTEBOOK_SLUG..."

        for i in $(seq 1 120); do
          RAW_STATUS=$(kaggle kernels status $NOTEBOOK_SLUG)
          echo "[$i/120] Status: $RAW_STATUS"

          if echo "$RAW_STATUS" | grep -qi "complete"; then
            echo "Training finished!"
            exit 0
          elif echo "$RAW_STATUS" | grep -qi "error"; then
            echo "Training failed!"
            kaggle kernels output $NOTEBOOK_SLUG -p kaggle_output || true
            cat kaggle_output/*.log 2>/dev/null || true
            exit 1
          fi

          sleep 60
        done

        echo "Timeout waiting for Kaggle run"
        exit 1

    # =================================
    # Download output
    # =================================

    - name: Download Kaggle output
      env:
        KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      run: |
        kaggle kernels output $KAGGLE_USERNAME/trashnet-training -p kaggle_output
        echo "Files downloaded:"
        ls -la kaggle_output/

    # =================================
    # Collect results
    # =================================

    - name: Collect results
      run: |
        mkdir -p results

        for f in confusion_matrix_resnet confusion_matrix_swin \
                  sample_per_class_resnet sample_per_class_swin \
                  prediction_results_resnet prediction_results_swin \
                  accuracy_per_class_resnet accuracy_per_class_swin \
                  training_history_resnet training_history_swin; do
          if [ -f "kaggle_output/${f}.png" ]; then
            cp "kaggle_output/${f}.png" results/
            echo "Copied ${f}.png"
          else
            echo "WARNING: ${f}.png not found in kaggle_output!"
          fi
        done

        # Copy history JSON untuk dipakai generate_readme jika diperlukan
        cp kaggle_output/history_resnet.json kaggle_output/history_resnet.json 2>/dev/null || true
        cp kaggle_output/history_swin.json   kaggle_output/history_swin.json   2>/dev/null || true

        echo "Results folder:"
        ls -la results/

    # =================================
    # Generate README
    # =================================

    - name: Generate README
      run: python generate_readme.py

    # =================================
    # Commit results
    # =================================

    - name: Commit results
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add results/
        git add README.md

        git diff --staged --quiet || git commit -m "ci: update results from Kaggle [run: ${{ github.run_number }}] [skip ci]"

        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # =================================
    # Upload artifact
    # =================================

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: training-results-${{ github.run_number }}
        path: |
          results/
          kaggle_output/metrics_resnet.json
          kaggle_output/metrics_swin.json