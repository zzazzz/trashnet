name: Model Training and Evaluation Pipeline

on:
  push:
    branches:
      - main  # Trigger on push to the main branch

jobs:

  train_model:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4  
      with:
        python-version: '3.11.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Debug Python environment
      run: |
        python --version
        pip --version
        pip list

    - name: Check huggingface installation
      run: |
        python -c "import huggingface_hub; print(huggingface_hub.__version__)"

    - name: Check HF token
      run: |
        echo "HF_TOKEN length:"
        echo ${#HF_TOKEN}
      env:
        HF_TOKEN: ${{ secrets.HF_API_KEY }}

    - name: Log in to WandB
      run: |
        echo "WANDB_API_KEY=${{ secrets.WANDB_API_KEY }}" >> $GITHUB_ENV
        wandb login ${{ secrets.WANDB_API_KEY }}

    - name: Log in to Hugging Face
      run: |
        python -m huggingface_hub.cli.login --token ${{ secrets.HF_API_KEY }}

    - name: Run model training
      run: |
        python model_training.py

  validate_model:
    needs: train_model
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4  
      with:
        python-version: '3.11.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run model validation
      run: |
        python validate_model.py
